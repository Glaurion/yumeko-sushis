<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>YUMEKO SUSHIS - Mon compte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/favicon.png" />
  <link rel="preload" href="images/logo-yumeko.png" as="image" />
  <link rel="prefetch" href="accueil.html" />
  <link rel="prefetch" href="index.html" />
  <meta name="theme-color" content="#ff4d6d" />

  <style>
    .account-wrap{
      max-width:760px;
      margin:0 auto;
      display:grid;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:var(--radius-lg);
      padding:16px;
      box-shadow:var(--shadow-soft);
    }

    .card h3{
      margin:0 0 12px;
      font-size:1.2rem;
      color:#c2173b;
    }

    .panel-toggle{
      width:100%;
      border:1px solid var(--card-border);
      border-radius:12px;
      background:#fff8ef;
      padding:10px 12px;
      font:inherit;
      font-weight:800;
      color:#c2173b;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      text-align:left;
      transition:transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
    }

    .panel-toggle:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow-soft);
      border-color:rgba(255,77,109,.3);
    }

    .panel-toggle[aria-expanded="true"]{
      background:#fff0f4;
      border-color:rgba(255,77,109,.35);
    }

    .panel-icon{
      font-size:1rem;
      line-height:1;
      transition:transform .2s ease;
    }

    .panel-toggle[aria-expanded="true"] .panel-icon{
      transform:rotate(180deg);
    }

    .panel-body{
      padding-top:12px;
    }

    .auth-form{
      display:grid;
      gap:10px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field label{
      font-weight:700;
      font-size:.92rem;
    }

    .field input{
      border:1px solid var(--card-border);
      border-radius:var(--radius-sm);
      padding:10px 12px;
      font:inherit;
      background:#fff;
    }

    .btn-main{
      border:none;
      border-radius:var(--radius-md);
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      background:var(--accent);
      color:#111;
      transition:transform .15s ease, background .15s ease, box-shadow .15s ease;
    }

    .btn-main:hover{
      background:var(--accent-strong);
      transform:translateY(-1px);
      box-shadow:0 8px 16px rgba(255,195,0,.22);
    }

    .btn-light{
      border:1px solid var(--card-border);
      background:#fff;
      border-radius:var(--radius-sm);
      padding:10px 12px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, border-color .15s ease, box-shadow .15s ease;
    }

    .btn-light:hover{
      transform:translateY(-1px);
      border-color:rgba(255,77,109,.35);
      box-shadow:0 6px 12px rgba(0,0,0,.06);
    }

    .btn-light:disabled,
    .btn-main:disabled{
      opacity:.55;
      cursor:not-allowed;
      transform:none !important;
      box-shadow:none !important;
    }

    .small-note{
      margin-top:10px;
      font-size:.92rem;
      color:#5c6870;
    }

    .link-btn{
      background:transparent;
      border:none;
      color:#c2173b;
      font-weight:700;
      cursor:pointer;
      padding:0;
      text-decoration:underline;
      font:inherit;
    }

    .hidden{ display:none !important; }

    .profile-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .profile-actions-right{
      justify-content:flex-end;
    }

    .logout-area{
      display:flex;
      justify-content:flex-end;
      margin-top:4px;
    }

    .orders-list{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .order-card{
      border:1px solid var(--card-border);
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
    }

    .order-summary{
      width:100%;
      border:1px solid var(--card-border);
      border-radius:var(--radius-md);
      padding:12px;
      background:#fff;
      text-align:left;
      cursor:pointer;
      transition:box-shadow .15s, transform .15s, border-color .15s;
      font:inherit;
      color:inherit;
    }

    .order-summary:hover{
      transform:translateY(-1px);
      box-shadow:var(--shadow-hover);
      border-color:rgba(255,77,109,.25);
    }

    .order-summary .order-head{
      margin-bottom:4px;
    }

    .order-summary-meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:6px;
      font-size:.9rem;
      color:#4f5b63;
    }

    .order-chip{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--card-border);
      background:#fff8ef;
      color:#3a3a3a;
      font-size:.82rem;
      font-weight:600;
    }

    .order-status-chip{
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.2px;
    }

    .status-nouveau{
      background:#ffeef3;
      color:#bf1f45;
      border-color:rgba(194,23,59,.25);
    }

    .status-en_cours{
      background:#fff8e4;
      color:#8a5b00;
      border-color:rgba(255,195,0,.35);
    }

    .status-termine{
      background:#e9f8ef;
      color:#176c42;
      border-color:rgba(14,122,79,.28);
    }

    .admin-order-card{
      display:grid;
      gap:8px;
      padding:10px;
    }

    .admin-order-actions{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      padding:0 2px 2px;
    }

    .order-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-weight:700;
      margin-bottom:6px;
    }

    .order-items{
      margin:8px 0 0;
      padding-left:18px;
    }

    .admin-area{
      display:grid;
      gap:12px;
    }

    .admin-tabs{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      margin-bottom:12px;
    }

    .admin-tab{
      border:1px solid var(--card-border);
      background:#fff;
      border-radius:999px;
      padding:8px 12px;
      font-weight:700;
      cursor:pointer;
      transition:transform .15s, box-shadow .15s, border-color .15s, background .15s;
    }

    .admin-tab:hover{
      transform:translateY(-1px);
      box-shadow:0 6px 12px rgba(0,0,0,.06);
      border-color:rgba(255,77,109,.3);
    }

    .admin-tab.active{
      background:var(--accent);
      color:#111;
      border-color:rgba(0,0,0,.08);
    }

    .course-list{
      display:grid;
      gap:8px;
      margin-top:12px;
    }

    .course-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .course-row label{
      display:flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      font-weight:600;
      min-width:0;
    }

    .course-row input[type="checkbox"]{
      width:18px;
      height:18px;
      accent-color:#ff4d6d;
      cursor:pointer;
      flex:0 0 auto;
    }

    .course-qty{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--card-border);
      background:#fff8ef;
      font-size:.82rem;
      font-weight:700;
      color:#3a3a3a;
      white-space:nowrap;
    }

    .admin-subtitle{
      margin:14px 2px 8px;
      font-size:1rem;
      color:#c2173b;
    }

    .admin-review-card{
      display:grid;
      gap:8px;
      padding:12px;
    }

    .admin-review-meta{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      color:#4f5b63;
      font-size:.88rem;
    }

    .admin-review-stars{
      color:#ffb703;
      letter-spacing:.08em;
      font-size:.95rem;
      font-weight:800;
    }

    .admin-review-text{
      margin:0;
      color:#2c3338;
      line-height:1.45;
    }

    .review-status-chip{
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.25px;
    }

    .review-status-pending{
      background:#fff3e8;
      color:#a05a00;
      border-color:rgba(160,90,0,.25);
    }

    .review-status-approved{
      background:#e8f7ef;
      color:#176c42;
      border-color:rgba(14,122,79,.28);
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      z-index:1200;
      background:rgba(0,0,0,.42);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .modal-overlay.hidden{
      display:none !important;
    }

    .modal-card{
      width:min(96%,620px);
      max-height:86vh;
      overflow:auto;
      background:#fff;
      border:1px solid var(--card-border);
      border-radius:var(--radius-lg);
      box-shadow:0 20px 46px rgba(0,0,0,.18);
      padding:16px;
    }

    .modal-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .modal-close{
      border:1px solid var(--card-border);
      background:#fff;
      border-radius:var(--radius-sm);
      width:36px;
      height:36px;
      line-height:1;
      font-size:1.3rem;
      cursor:pointer;
    }

    .modal-meta{
      font-size:.92rem;
      color:#4f5b63;
      display:grid;
      gap:4px;
      margin-bottom:8px;
    }
  </style>
</head>
<body>
  <div id="header">
    <header class="site-header jp">
      <div class="header-inner">
        <a href="accueil.html" class="brand" aria-label="Accueil - YUMEKO SUSHIS">
          <img src="images/logo-yumeko.png" alt="YUMEKO SUSHIS" class="logo" width="200" height="200" decoding="async" fetchpriority="high">
          <div class="brand-text">
            <h1>YUMEKO SUSHIS</h1>
          </div>
        </a>
        <nav class="main-nav">
          <a href="accueil.html">Accueil</a>
          <span class="nav-sep" aria-hidden="true"></span>
          <a href="index.html">Menu</a>
          <span class="nav-sep" aria-hidden="true"></span>
          <a href="mon-compte.html">Mon compte</a>
        </nav>
      </div>
    </header>
  </div>

  <main class="container">
    <section class="section" aria-labelledby="titre-compte">
      <h2 id="titre-compte">Mon compte</h2>
      <div class="sep" aria-hidden="true"></div>

      <div class="account-wrap">
        <div id="authArea" class="card">
          <h3 id="authTitle">Connexion</h3>
          <div id="loginWrap">
            <form id="loginForm" class="auth-form" novalidate>
              <div class="field">
                <label for="loginEmail">Email</label>
                <input id="loginEmail" name="email" type="email" required />
              </div>
              <div class="field">
                <label for="loginPassword">Mot de passe</label>
                <input id="loginPassword" name="password" type="password" required />
              </div>
              <button class="btn-main" type="submit">Se connecter</button>
            </form>
            <p id="loginStatus" class="status" aria-live="polite"></p>

            <p class="small-note">
              Pas encore de compte ?
              <button id="showRegisterBtn" type="button" class="link-btn">Inscrivez-vous</button>
            </p>
          </div>

          <div id="registerWrap" class="hidden">
            <hr style="border:none;border-top:1px solid var(--card-border);margin:14px 0;" />
            <form id="registerForm" class="auth-form" novalidate>
              <div class="field">
                <label for="regName">Nom complet</label>
                <input id="regName" name="name" type="text" required />
              </div>
              <div class="field">
                <label for="regEmail">Email</label>
                <input id="regEmail" name="email" type="email" required />
              </div>
              <div class="field">
                <label for="regPassword">Mot de passe</label>
                <input id="regPassword" name="password" type="password" minlength="6" required />
              </div>
              <div class="field">
                <label for="regPasswordConfirm">Confirmer le mot de passe</label>
                <input id="regPasswordConfirm" name="password_confirm" type="password" minlength="6" required />
              </div>
              <div class="profile-actions">
                <button class="btn-main" type="submit">Creer mon compte</button>
                <button id="hideRegisterBtn" class="btn-light" type="button">Annuler</button>
              </div>
            </form>
            <p id="registerStatus" class="status" aria-live="polite"></p>
          </div>
        </div>

        <div id="profileArea" class="hidden">
          <div class="card">
            <button class="panel-toggle" type="button" data-target="panelProfileBody" aria-expanded="false">
              <span>Mes informations</span>
              <span class="panel-icon" aria-hidden="true">v</span>
            </button>
            <div id="panelProfileBody" class="panel-body hidden">
              <form id="profileForm" class="auth-form" novalidate>
                <input id="currentEmail" type="hidden" />
                <div class="field">
                  <label for="profileName">Nom complet</label>
                  <input id="profileName" name="name" type="text" required />
                </div>
                <div class="field">
                  <label for="profileEmail">Email</label>
                  <input id="profileEmail" name="email" type="email" required />
                </div>
                <div class="field">
                  <label for="profilePassword">Nouveau mot de passe (optionnel)</label>
                  <input id="profilePassword" name="password" type="password" minlength="6" />
                </div>
                <div class="field">
                  <label for="profilePasswordConfirm">Confirmer le nouveau mot de passe</label>
                  <input id="profilePasswordConfirm" name="password_confirm" type="password" minlength="6" />
                </div>
                <div id="profileSaveActions" class="profile-actions profile-actions-right hidden">
                  <button id="saveProfileBtn" class="btn-main" type="submit">Enregistrer mes infos</button>
                </div>
              </form>
              <p id="profileStatus" class="status" aria-live="polite"></p>

          <div class="card">
            <button class="panel-toggle" type="button" data-target="panelOrdersBody" aria-expanded="false">

              <span class="panel-icon" aria-hidden="true">v</span>

            </div>
          </div>

                <div id="adminPanelOrders">
                  <div id="adminOrders" class="orders-list"></div>

                  <div class="profile-actions">
                    <button id="refreshCoursesBtn" class="btn-light" type="button">Mettre a jour</button>
                    <button id="resetCoursesBtn" class="btn-light" type="button">Reinitialiser les coches</button>

                <div id="adminPanelReviews" class="hidden">

  <div id="orderModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="orderModalTitle">
      <div class="modal-top">
        <h3 id="orderModalTitle" style="margin:0;color:#c2173b;">Detail de commande</h3>
        <button id="orderModalClose" class="modal-close" type="button" aria-label="Fermer">&times;</button>
      </div>

      <div id="orderModalMeta" class="modal-meta"></div>
      <div id="orderModalItems"></div>
      <div id="orderModalComment" class="small-note" style="margin-top:10px;"></div>
      <div class="profile-actions">
        <button id="reorderBtn" class="btn-main" type="button">Commander a nouveau</button>
      </div>
      <div id="adminOrderActions" class="profile-actions hidden">
        <button id="printLabelBtn" class="btn-light" type="button">Imprimer etiquette</button>
        <button id="printPdfBtn" class="btn-light" type="button">Imprimer PDF</button>
        <button id="markDoneBtn" class="btn-main" type="button">Marquer terminee</button>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script>
    const ACCOUNTS_KEY = 'yumeko_accounts_v1';
    const SESSION_KEY = 'yumeko_session_v1';
    const ORDERS_KEY = 'yumeko_orders_v1';
    const REORDER_KEY = 'yumeko_reorder_cart_v1';
    const COURSES_CHECK_KEY = 'yumeko_admin_courses_checks_v1';
    const ADMIN_EMAIL = 'admin@yumeko.fr';
    const ADMIN_PASSWORD = 'Admin123!';
    const ADMIN_NAME = 'Admin Yumeko';
    const SUPABASE_URL = 'https://rlyouiuobnhsvxtecriu.supabase.co';
    const SUPABASE_PUBLISHABLE_KEY = 'sb_publishable_RBQC4-HKQ8L1bncB_4VJAA_G_xXqg_-';
    const ORDERS_TABLE = 'orders';
    const REVIEWS_TABLE = 'reviews';
    const STATUS_NEW = 'nouveau';
    const STATUS_IN_PROGRESS = 'en_cours';
    const STATUS_DONE = 'termine';
    let userOrdersCache = [];
    let adminOrdersCache = [];
    let adminReviewsCache = [];
    let selectedOrder = null;
    let lastConnectedEmail = '';
    let profileInitialState = null;

    function setActiveNav() {
      const here = location.pathname.split('/').pop() || 'mon-compte.html';
      document.querySelectorAll('.main-nav a').forEach(a => {
        const href = a.getAttribute('href');
        if (href && here === href) a.classList.add('active');
      });
    }

    function loadComponent(id, file) {
      const host = document.getElementById(id);
      if (!host) return;
      if (host.innerHTML.trim().length) {
        if (id === 'header') setActiveNav();
        return;
      }
      fetch(file)
        .then(response => response.text())
        .then(data => {
          host.innerHTML = data;
          if (id === 'header') setActiveNav();
        });
    }

    function readJSON(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
      catch (e) { return fallback; }
    }

    function writeJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function readAccounts() {
      return readJSON(ACCOUNTS_KEY, []);
    }

    function saveAccounts(accounts) {
      writeJSON(ACCOUNTS_KEY, accounts);
    }

    function readSession() {
      return readJSON(SESSION_KEY, null);
    }

    function writeSession(account) {
      writeJSON(SESSION_KEY, {
        name: account.name,
        email: account.email,
        role: account.role || 'user'
      });
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
    }

    function normalizeOrderStatus(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (raw === STATUS_DONE || raw === 'terminee') return STATUS_DONE;
      if (raw === STATUS_IN_PROGRESS || raw === 'encours' || raw === 'en-cours') return STATUS_IN_PROGRESS;
      return STATUS_NEW;
    }

    function getOrderStatusLabel(status) {
      if (status === STATUS_DONE) return 'Terminee';
      if (status === STATUS_IN_PROGRESS) return 'En cours';
      return 'Nouveau';
    }

    function getOrderStatusClass(status) {
      return 'status-' + normalizeOrderStatus(status);
    }

    function parseOrderNumber(order) {
      const n = Number(order && order.order_no);
      return Number.isInteger(n) && n > 0 ? n : 0;
    }

    function getOrderDisplayId(order) {
      const no = parseOrderNumber(order);
      if (no > 0) return 'YUMEKO #' + no;
      return String(order && order.id || 'Commande');
    }

    function normalizeOrderRecord(order) {
      if (!order || typeof order !== 'object') return null;
      const id = String(order.id || '').trim();
      if (!id) return null;
      const items = Array.isArray(order.items) ? order.items : [];
      const normalizedItems = items
        .map((it) => ({
          code: String(it && it.code || '').trim().toUpperCase(),
          name: String(it && it.name || '').trim(),
          qty: Math.max(1, Number(it && it.qty || 1))
        }))
        .filter((it) => it.code && it.name);
      return {
        id,
        order_no: Number(order.order_no) || 0,
        created_at: String(order.created_at || new Date().toISOString()),
        customer_name: String(order.customer_name || 'Client').trim(),
        email: String(order.email || '').trim().toLowerCase(),
        comments: String(order.comments || '').trim(),
        items: normalizedItems,
        admin_status: normalizeOrderStatus(order.admin_status),
        account_email: String(order.account_email || '').trim().toLowerCase(),
        account_role: String(order.account_role || 'user').trim().toLowerCase()
      };
    }

    function readOrders() {
      const raw = readJSON(ORDERS_KEY, []);
      const list = Array.isArray(raw) ? raw.filter(o => o && typeof o === 'object') : [];
      let changed = list.length !== raw.length;
      list.forEach((order) => {
        const normalized = normalizeOrderStatus(order.admin_status);
        if (order.admin_status !== normalized) {
          order.admin_status = normalized;
          changed = true;
        }
      });

      const usedNumbers = new Set();
      list.forEach((order) => {
        const n = parseOrderNumber(order);
        if (n > 0) usedNumbers.add(n);
      });

      const missing = list
        .filter((order) => parseOrderNumber(order) === 0)
        .sort((a, b) => String(a.created_at || '').localeCompare(String(b.created_at || '')));

      let nextNo = 1;
      missing.forEach((order) => {
        while (usedNumbers.has(nextNo)) nextNo += 1;
        order.order_no = nextNo;
        usedNumbers.add(nextNo);
        changed = true;
      });

      if (changed) writeJSON(ORDERS_KEY, list);
      return list;
    }

    function saveOrders(orders) {
      writeJSON(ORDERS_KEY, Array.isArray(orders) ? orders : []);
    }

    async function fetchOrdersOnline(session) {
      if (!session) return [];
      const select = 'id,order_no,created_at,customer_name,email,comments,items,admin_status,account_email,account_role';
      let url = SUPABASE_URL + '/rest/v1/' + ORDERS_TABLE + '?select=' + select + '&order=created_at.desc';

      if (!isAdminSession(session)) {
        const email = encodeURIComponent(String(session.email || '').trim().toLowerCase());
        if (!email) return [];
        url += '&or=(email.eq.' + email + ',account_email.eq.' + email + ')';
      }

      const response = await fetch(url, {
        method: 'GET',
        headers: getSupabaseHeaders(false)
      });
      if (!response.ok) {
        throw new Error('Erreur lecture commandes online (' + response.status + ')');
      }
      const rows = await response.json();
      const list = Array.isArray(rows) ? rows : [];
      return list
        .map(normalizeOrderRecord)
        .filter(Boolean);
    }

    function mergeOrdersWithLocal(onlineOrders) {
      const online = Array.isArray(onlineOrders) ? onlineOrders : [];
      const local = readOrders();
      const map = new Map();
      online.forEach((o) => map.set(String(o.id), o));
      local.forEach((o) => {
        const id = String(o && o.id || '').trim();
        if (!id || map.has(id)) return;
        map.set(id, normalizeOrderRecord(o) || o);
      });

      const merged = Array.from(map.values()).filter(Boolean);
      merged.sort((a, b) => String(b.created_at || '').localeCompare(String(a.created_at || '')));
      saveOrders(merged);
      return readOrders();
    }

    async function syncOrdersFromOnline(session) {
      if (!session || !String(session.email || '').trim()) return readOrders();
      try {
        const online = await fetchOrdersOnline(session);
        return mergeOrdersWithLocal(online);
      } catch (error) {
        return readOrders();
      }
    }

    async function updateOrderStatusById(orderId, nextStatus) {
      const id = String(orderId || '').trim();
      if (!id) return null;
      const normalizedStatus = normalizeOrderStatus(nextStatus);

      try {
        const url = SUPABASE_URL + '/rest/v1/' + ORDERS_TABLE + '?id=eq.' + encodeURIComponent(id);
        const response = await fetch(url, {
          method: 'PATCH',
          headers: {
            ...getSupabaseHeaders(true),
            Prefer: 'return=representation'
          },
          body: JSON.stringify({ admin_status: normalizedStatus })
        });
        if (response.ok) {
          const rows = await response.json();
          if (Array.isArray(rows) && rows.length) {
            const remote = normalizeOrderRecord(rows[0]);
            if (remote) {
              const list = readOrders();
              const idxRemote = list.findIndex((o) => String(o && o.id || '') === id);
              if (idxRemote !== -1) list[idxRemote] = remote;
              else list.unshift(remote);
              saveOrders(list);
            }
          }
        }
      } catch (error) {}

      const orders = readOrders();
      const idx = orders.findIndex((o) => String(o.id || '').trim() === id);
      if (idx === -1) return null;
      orders[idx].admin_status = normalizedStatus;
      saveOrders(orders);
      return orders[idx];
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString('fr-FR');
    }

      const items = Array.isArray(order.items) ? order.items : [];

    function renderCoursesForAdmin() {
      const box = document.getElementById('adminCourses');
      if (!box) return;

      const checks = readCoursesChecks();
      const totals = {};
      const orders = readOrders();

      orders.forEach((order) => {
        const items = Array.isArray(order && order.items) ? order.items : [];
        items.forEach((it) => {
          const code = String(it && it.code || '').trim().toUpperCase();
          const name = String(it && it.name || code || 'Article').trim();
          if (!code) return;
          if (!totals[code]) totals[code] = { code, name, qty: 0 };
          totals[code].qty += Number(it && it.qty || 1);
        });
      });

      const list = Object.values(totals)
        .filter((it) => it.qty > 0)
        .sort((a, b) => b.qty - a.qty);

      if (!list.length) {
        box.innerHTML = '<p class="muted">Pas encore de donnees de commande pour generer les courses.</p>';
        return;
      }

      box.innerHTML = list.map((it) => {
        const code = escapeHtml(it.code);
        const name = escapeHtml(it.name);
        const checked = checks[it.code] ? 'checked' : '';
        return (
          '<div class="order-card course-row">' +
            '<label>' +
              '<input class="course-check" type="checkbox" data-course-code="' + code + '" ' + checked + ' />' +
              '<span>' + name + ' (' + code + ')</span>' +
            '</label>' +
            '<span class="course-qty">' + it.qty + ' commande(s)</span>' +
          '</div>'
        );
      }).join('');
    }

    function getSupabaseHeaders(includeJson) {
      const headers = {
        apikey: SUPABASE_PUBLISHABLE_KEY,
        Authorization: 'Bearer ' + SUPABASE_PUBLISHABLE_KEY
      };
      if (includeJson) headers['Content-Type'] = 'application/json';
      return headers;
    }

    function normalizeAdminReview(review) {
      const id = Number(review && review.id || 0);
      const rawName = String(review && review.name || '').trim();
      const name = rawName ? rawName.slice(0, 40) : 'Client';
      const rawText = String(review && review.text || '').trim();
      const text = rawText ? rawText.slice(0, 400) : '';
      const ratingNum = Number(review && review.rating || 5);
      const rating = Math.max(1, Math.min(5, Number.isFinite(ratingNum) ? ratingNum : 5));
      const createdAt = String(review && review.created_at || new Date().toISOString());
      const approved = !!(review && review.approved);
      return { id, name, text, rating, created_at: createdAt, approved };
    }

    function renderReviewStars(rating) {
      const n = Math.max(1, Math.min(5, Number(rating) || 5));
      return '&#9733;'.repeat(n) + '&#9734;'.repeat(5 - n);
    }

    async function fetchReviewsForAdmin() {
      const query = '?select=id,name,text,rating,created_at,approved&order=created_at.desc&limit=200';
      const url = SUPABASE_URL + '/rest/v1/' + REVIEWS_TABLE + query;
      const response = await fetch(url, {
        method: 'GET',
        headers: getSupabaseHeaders(false)
      });
      if (!response.ok) {
        throw new Error('Erreur lecture avis (' + response.status + ')');
      }
      const data = await response.json();
      return Array.isArray(data) ? data : [];
    }

    async function setReviewApproval(reviewId, isApproved) {
      const id = Number(reviewId);
      if (!Number.isFinite(id) || id <= 0) return;
      const url = SUPABASE_URL + '/rest/v1/' + REVIEWS_TABLE + '?id=eq.' + encodeURIComponent(String(id));
      const response = await fetch(url, {
        method: 'PATCH',
        headers: {
          ...getSupabaseHeaders(true),
          Prefer: 'return=minimal'
        },
        body: JSON.stringify({ approved: !!isApproved })
      });
      if (!response.ok) {
        throw new Error('Erreur mise a jour avis (' + response.status + ')');
      }
    }

    async function deleteReviewById(reviewId) {
      const id = Number(reviewId);
      if (!Number.isFinite(id) || id <= 0) return;
      const url = SUPABASE_URL + '/rest/v1/' + REVIEWS_TABLE + '?id=eq.' + encodeURIComponent(String(id));
      const response = await fetch(url, {
        method: 'DELETE',
        headers: {
          ...getSupabaseHeaders(false),
          Prefer: 'return=minimal'
        }
      });
      if (!response.ok) {
        throw new Error('Erreur suppression avis (' + response.status + ')');
      }
    }

    function buildAdminReviewCard(review) {
      const id = Number(review.id);
      const statusClass = review.approved ? 'review-status-approved' : 'review-status-pending';
      const statusLabel = review.approved ? 'Publie' : 'En attente';
      const mainAction = review.approved
        ? '<button type="button" class="btn-light admin-review-unapprove-btn" data-review-id="' + id + '">Retirer</button>'
        : '<button type="button" class="btn-main admin-review-approve-btn" data-review-id="' + id + '">Approuver</button>';

      return (
        '<div class="order-card admin-review-card">' +
          '<div class="order-head">' +
            '<span>' + escapeHtml(review.name) + '</span>' +
            '<span class="order-chip review-status-chip ' + statusClass + '">' + statusLabel + '</span>' +
          '</div>' +
          '<div class="admin-review-meta">' +
            '<span>' + formatDate(review.created_at) + '</span>' +
            '<span class="admin-review-stars" aria-label="' + review.rating + ' etoiles sur 5">' + renderReviewStars(review.rating) + '</span>' +
          '</div>' +
          '<p class="admin-review-text">' + escapeHtml(review.text || '-') + '</p>' +
          '<div class="profile-actions profile-actions-right">' +

          '</div>' +

    async function renderReviewsForAdmin() {
      const pendingBox = document.getElementById('adminReviewsPending');
      const approvedBox = document.getElementById('adminReviewsApproved');
      const status = document.getElementById('adminReviewsStatus');
      if (!pendingBox || !approvedBox) return;

      if (status) {
        status.textContent = '';
        status.className = 'status';
      }

      try {
        const reviews = await fetchReviewsForAdmin();
        adminReviewsCache = reviews.map(normalizeAdminReview);

        const pending = adminReviewsCache.filter((r) => !r.approved);
        const approved = adminReviewsCache.filter((r) => r.approved);

        pendingBox.innerHTML = pending.length
          ? pending.map(buildAdminReviewCard).join('')
          : '<p class="muted">Aucun avis en attente.</p>';

        approvedBox.innerHTML = approved.length
          ? approved.map(buildAdminReviewCard).join('')
          : '<p class="muted">Aucun avis publie pour le moment.</p>';
      } catch (error) {
        pendingBox.innerHTML = '<p class="muted">Chargement impossible.</p>';
        approvedBox.innerHTML = '<p class="muted">Chargement impossible.</p>';
        if (status) {
          status.textContent = 'Impossible de charger les avis depuis Supabase. Verifiez les policies.';
          status.className = 'status err';
        }
      }
    }

    async function printSelectedOrder(mode) {
      if (!selectedOrder) return;
      const win = window.open('', '_blank', 'width=900,height=900');
      if (!win) {
        alert('Autorisez les pop-ups pour imprimer la commande.');
        return;
      }

      const isAdmin = isAdminSession(readSession());
      if (isAdmin && normalizeOrderStatus(selectedOrder.admin_status) !== STATUS_DONE) {
        const updated = await updateOrderStatusById(selectedOrder.id, STATUS_IN_PROGRESS);
        if (updated) {
          selectedOrder = updated;
          renderOrdersForAdmin();
          renderAdminModalStatus(selectedOrder);
        }
      }

      win.document.open();
      win.document.write(buildOrderPrintDocument(selectedOrder, mode));
      win.document.close();
      win.focus();
      setTimeout(() => {
        try { win.print(); } catch (e) {}
      }, 150);
    }

    async function markSelectedOrderDone() {
      if (!selectedOrder) return;
      const updated = await updateOrderStatusById(selectedOrder.id, STATUS_DONE);
      if (!updated) return;
      selectedOrder = updated;
      renderOrdersForAdmin();
      renderAdminModalStatus(selectedOrder);
    }

      modal.setAttribute('aria-hidden', 'false');
    }

    function closeOrderModal() {
      const modal = document.getElementById('orderModal');
      if (!modal) return;
      modal.classList.add('hidden');
      modal.setAttribute('aria-hidden', 'true');
      selectedOrder = null;
    }

    function reorderFromSelectedOrder() {
      if (!selectedOrder) return;
      const items = Array.isArray(selectedOrder.items) ? selectedOrder.items : [];
      if (!items.length) return;

      const payload = items
        .map(it => ({
          code: String(it.code || '').trim(),
          name: String(it.name || '').trim(),
          qty: Number(it.qty) || 1
        }))
        .filter(it => it.code && it.qty > 0);

      if (!payload.length) return;
      localStorage.setItem(REORDER_KEY, JSON.stringify(payload));
      window.location.href = 'index.html?reorder=1#panier';
    }

    function showRegister(show) {
      const wrap = document.getElementById('registerWrap');
      const loginWrap = document.getElementById('loginWrap');
      const authTitle = document.getElementById('authTitle');
      const loginStatus = document.getElementById('loginStatus');
      const registerStatus = document.getElementById('registerStatus');
      if (!wrap) return;
      wrap.classList.toggle('hidden', !show);
      if (loginWrap) loginWrap.classList.toggle('hidden', !!show);
      if (authTitle) authTitle.textContent = show ? 'Inscription' : 'Connexion';
      if (show && loginStatus) {
        loginStatus.textContent = '';
        loginStatus.className = 'status';
      }
      if (!show && registerStatus) {
        registerStatus.textContent = '';
        registerStatus.className = 'status';
      }
    }

    function setPanelOpen(targetId, open) {
      if (!targetId) return;
      const body = document.getElementById(targetId);
      if (!body) return;
      body.classList.toggle('hidden', !open);
      const toggle = document.querySelector('.panel-toggle[data-target="' + targetId + '"]');
      if (toggle) toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    }

    function collapseAllAccountPanels() {
      document.querySelectorAll('.panel-toggle[data-target]').forEach((toggle) => {
        const targetId = String(toggle.dataset.target || '').trim();
        if (!targetId) return;
        setPanelOpen(targetId, false);
      });
    }

    async function renderUI() {
      const session = readSession();
      const authArea = document.getElementById('authArea');
      const profileArea = document.getElementById('profileArea');
      const adminArea = document.getElementById('adminArea');
      const logoutArea = document.getElementById('logoutArea');

      if (!session) {
        authArea.classList.remove('hidden');
        profileArea.classList.add('hidden');
        if (adminArea) adminArea.classList.add('hidden');
        if (logoutArea) logoutArea.classList.add('hidden');
        showRegister(false);
        lastConnectedEmail = '';
        profileInitialState = null;
        updateProfileSaveButtonVisibility();
        return;
      }

      authArea.classList.add('hidden');
      profileArea.classList.remove('hidden');
      if (logoutArea) logoutArea.classList.remove('hidden');

      document.getElementById('profileName').value = session.name || '';
      document.getElementById('profileEmail').value = session.email || '';
      document.getElementById('currentEmail').value = session.email || '';
      document.getElementById('profilePassword').value = '';
      document.getElementById('profilePasswordConfirm').value = '';
      profileInitialState = {
        name: String(session.name || '').trim(),
        email: String(session.email || '').trim().toLowerCase()
      };
      updateProfileSaveButtonVisibility();

      await syncOrdersFromOnline(session);

      renderOrdersForUser(session.email || '');
      if (isAdminSession(session)) {
        if (adminArea) adminArea.classList.remove('hidden');
        renderOrdersForAdmin();
        renderCoursesForAdmin();
        renderReviewsForAdmin();
        setAdminTab('orders');
      } else {
        if (adminArea) adminArea.classList.add('hidden');
      }

      const sessionEmail = String(session.email || '').toLowerCase();
      if (lastConnectedEmail !== sessionEmail) {
        collapseAllAccountPanels();
      }
      lastConnectedEmail = sessionEmail;
    }

    function initAuth() {
      const showRegisterBtn = document.getElementById('showRegisterBtn');
      const hideRegisterBtn = document.getElementById('hideRegisterBtn');

      showRegisterBtn?.addEventListener('click', () => showRegister(true));
      hideRegisterBtn?.addEventListener('click', () => showRegister(false));

      document.getElementById('registerForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const status = document.getElementById('registerStatus');
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regPasswordConfirm').value;

        if (!name || !email || !password || !confirm) {
          setStatus(status, 'Merci de remplir tous les champs.', false);
          return;
        }
        if (password.length < 6) {
          setStatus(status, 'Le mot de passe doit contenir au moins 6 caracteres.', false);
          return;
        }
        if (password !== confirm) {
          setStatus(status, 'Les mots de passe ne correspondent pas.', false);
          return;
        }

        const accounts = readAccounts();
        if (accounts.some(a => String(a.email).toLowerCase() === email)) {
          setStatus(status, 'Un compte existe deja avec cet email.', false);
          return;
        }

        const account = { name, email, password, role: 'user' };
        accounts.push(account);
        saveAccounts(accounts);
        setStatus(status, 'Compte cree avec succes.', true);
        alert('Compte cree avec succes. Vous pouvez maintenant vous connecter.');
        e.target.reset();
        showRegister(false);

        const loginEmail = document.getElementById('loginEmail');
        const loginPassword = document.getElementById('loginPassword');
        if (loginEmail) loginEmail.value = email;
        if (loginPassword) {
          loginPassword.value = '';
          loginPassword.focus();
        }
        setStatus(document.getElementById('loginStatus'), 'Compte cree. Connectez-vous.', true);
      });

      document.getElementById('loginForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('loginStatus');
        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
          setStatus(status, 'Merci de remplir tous les champs.', false);
          return;
        }

        const account = readAccounts().find(a =>
          String(a.email).toLowerCase() === email && String(a.password) === String(password)
        );

        if (!account) {
          setStatus(status, 'Email ou mot de passe incorrect.', false);
          return;
        }

        writeSession(account);
        setStatus(status, 'Connexion reussie.', true);
        e.target.reset();
        await renderUI();
      });
    }

    function initProfile() {
      const handleLogout = () => {
        clearSession();
        setStatus(document.getElementById('profileStatus'), '', false);
        renderUI();
      };

      document.getElementById('logoutBtnOutside')?.addEventListener('click', handleLogout);

      ['profileName', 'profileEmail', 'profilePassword', 'profilePasswordConfirm'].forEach((id) => {
        document.getElementById(id)?.addEventListener('input', updateProfileSaveButtonVisibility);
      });

      document.getElementById('profileForm')?.addEventListener('submit', async (e) => {
        e.preventDefault();
        const status = document.getElementById('profileStatus');
        const currentEmail = document.getElementById('currentEmail').value.trim().toLowerCase();
        const name = document.getElementById('profileName').value.trim();
        const email = document.getElementById('profileEmail').value.trim().toLowerCase();
        const password = document.getElementById('profilePassword').value;
        const confirm = document.getElementById('profilePasswordConfirm').value;

        if (!name || !email) {
          setStatus(status, 'Nom et email sont obligatoires.', false);
          return;
        }

        if (password || confirm) {
          if (password.length < 6) {
            setStatus(status, 'Le nouveau mot de passe doit contenir au moins 6 caracteres.', false);
            return;
          }
          if (password !== confirm) {
            setStatus(status, 'La confirmation du mot de passe ne correspond pas.', false);
            return;
          }
        }

        const accounts = readAccounts();
        const idx = accounts.findIndex(a => String(a.email).toLowerCase() === currentEmail);
        if (idx === -1) {
          setStatus(status, 'Compte introuvable.', false);
          return;
        }

        const duplicate = accounts.some((a, i) => i !== idx && String(a.email).toLowerCase() === email);
        if (duplicate) {
          setStatus(status, 'Cet email est deja utilise par un autre compte.', false);
          return;
        }

        accounts[idx].name = name;
        accounts[idx].email = email;
        if (password) accounts[idx].password = password;
        saveAccounts(accounts);
        writeSession(accounts[idx]);
        setStatus(status, 'Informations mises a jour.', true);
        await renderUI();
      });
    }

    function initOrdersSummary() {
      document.getElementById('userOrders')?.addEventListener('click', (e) => {
        const btn = e.target.closest('.order-summary');
        if (!btn) return;
        const idx = Number(btn.dataset.orderIndex);
        if (!Number.isInteger(idx) || idx < 0 || idx >= userOrdersCache.length) return;
        openOrderModal(userOrdersCache[idx]);
      });

      document.getElementById('adminOrders')?.addEventListener('click', async (e) => {
        const doneBtn = e.target.closest('.admin-mark-done-btn');
        if (doneBtn) {
          const idx = Number(doneBtn.dataset.adminOrderIndex);
          if (!Number.isInteger(idx) || idx < 0 || idx >= adminOrdersCache.length) return;
          const order = adminOrdersCache[idx];
          if (!order) return;
          const updated = await updateOrderStatusById(order.id, STATUS_DONE);
          renderOrdersForAdmin();
          if (updated && selectedOrder && String(selectedOrder.id || '') === String(order.id || '')) {
            selectedOrder = updated;
            renderAdminModalStatus(selectedOrder);
          }
          return;
        }

        const btn = e.target.closest('.admin-order-summary');
        if (!btn) return;
        const idx = Number(btn.dataset.adminOrderIndex);
        if (!Number.isInteger(idx) || idx < 0 || idx >= adminOrdersCache.length) return;
        openOrderModal(adminOrdersCache[idx]);
      });

      document.getElementById('orderModalClose')?.addEventListener('click', closeOrderModal);
      document.getElementById('orderModal')?.addEventListener('click', (e) => {
        if (e.target.id === 'orderModal') closeOrderModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeOrderModal();
      });
      document.getElementById('reorderBtn')?.addEventListener('click', reorderFromSelectedOrder);
      document.getElementById('printLabelBtn')?.addEventListener('click', () => printSelectedOrder('label'));
      document.getElementById('printPdfBtn')?.addEventListener('click', () => printSelectedOrder('pdf'));
      document.getElementById('markDoneBtn')?.addEventListener('click', markSelectedOrderDone);
    }

    function initAdminArea() {
      document.getElementById('adminTabOrders')?.addEventListener('click', () => setAdminTab('orders'));
      document.getElementById('adminTabCourses')?.addEventListener('click', () => setAdminTab('courses'));
      document.getElementById('adminTabReviews')?.addEventListener('click', () => {
        setAdminTab('reviews');
        renderReviewsForAdmin();
      });

      document.getElementById('refreshCoursesBtn')?.addEventListener('click', () => {
        renderCoursesForAdmin();
      });

      document.getElementById('refreshReviewsBtn')?.addEventListener('click', () => {
        renderReviewsForAdmin();
      });

      document.getElementById('resetCoursesBtn')?.addEventListener('click', () => {
        saveCoursesChecks({});
        renderCoursesForAdmin();
      });

      document.getElementById('adminCourses')?.addEventListener('change', (e) => {
        const input = e.target.closest('.course-check');
        if (!input) return;
        const code = String(input.dataset.courseCode || '').trim().toUpperCase();
        if (!code) return;
        const checks = readCoursesChecks();
        checks[code] = !!input.checked;
        saveCoursesChecks(checks);
      });

      document.getElementById('adminPanelReviews')?.addEventListener('click', async (e) => {
        const status = document.getElementById('adminReviewsStatus');

        const approveBtn = e.target.closest('.admin-review-approve-btn');
        if (approveBtn) {
          const id = Number(approveBtn.dataset.reviewId);
          if (!Number.isFinite(id) || id <= 0) return;
          try {
            await setReviewApproval(id, true);
            if (status) {
              status.textContent = 'Avis approuve.';
              status.className = 'status ok';
            }
            await renderReviewsForAdmin();
          } catch (error) {
            if (status) {
              status.textContent = 'Impossible dapprouver cet avis.';
              status.className = 'status err';
            }
          }
          return;
        }

        const unapproveBtn = e.target.closest('.admin-review-unapprove-btn');
        if (unapproveBtn) {
          const id = Number(unapproveBtn.dataset.reviewId);
          if (!Number.isFinite(id) || id <= 0) return;
          try {
            await setReviewApproval(id, false);
            if (status) {
              status.textContent = 'Avis retire des avis publics.';
              status.className = 'status ok';
            }
            await renderReviewsForAdmin();
          } catch (error) {
            if (status) {
              status.textContent = 'Impossible de retirer cet avis.';
              status.className = 'status err';
            }
          }
          return;
        }

        const deleteBtn = e.target.closest('.admin-review-delete-btn');
        if (deleteBtn) {
          const id = Number(deleteBtn.dataset.reviewId);
          if (!Number.isFinite(id) || id <= 0) return;
          if (!confirm('Supprimer definitivement cet avis ?')) return;
          try {
            await deleteReviewById(id);
            if (status) {
              status.textContent = 'Avis supprime.';
              status.className = 'status ok';
            }
            await renderReviewsForAdmin();
          } catch (error) {
            if (status) {
              status.textContent = 'Impossible de supprimer cet avis.';
              status.className = 'status err';
            }
          }
        }
      });
    }

    function initAccountPanels() {
      document.querySelectorAll('.panel-toggle[data-target]').forEach((toggle) => {
        toggle.addEventListener('click', () => {
          const targetId = String(toggle.dataset.target || '').trim();
          if (!targetId) return;
          const isOpen = toggle.getAttribute('aria-expanded') === 'true';
          setPanelOpen(targetId, !isOpen);
        });
      });
      collapseAllAccountPanels();
    }

    loadComponent('header', 'header.html');
    loadComponent('footer', 'footer.html');
    ensureAdminAccount();
    initAuth();
    initProfile();
    initOrdersSummary();
    initAdminArea();
    initAccountPanels();
    renderUI();
  </script>
</body>
</html>
