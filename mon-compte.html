<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>YUMEKO SUSHIS - Mon compte</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/favicon.png" />
  <meta name="theme-color" content="#ff4d6d" />

  <style>
    .account-wrap{
      max-width:760px;
      margin:0 auto;
      display:grid;
      gap:14px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--card-border);
      border-radius:16px;
      padding:16px;
      box-shadow:0 10px 26px rgba(255,77,109,.09), 0 3px 10px rgba(0,0,0,.04);
    }

    .card h3{
      margin:0 0 12px;
      font-size:1.2rem;
      color:#c2173b;
    }

    .auth-form{
      display:grid;
      gap:10px;
    }

    .field{
      display:grid;
      gap:6px;
    }

    .field label{
      font-weight:700;
      font-size:.92rem;
    }

    .field input{
      border:1px solid var(--card-border);
      border-radius:10px;
      padding:10px 12px;
      font:inherit;
      background:#fff;
    }

    .btn-main{
      border:none;
      border-radius:10px;
      padding:10px 12px;
      font-weight:800;
      cursor:pointer;
      background:var(--accent);
      color:#111;
    }

    .btn-main:hover{
      background:var(--accent-2);
    }

    .btn-light{
      border:1px solid var(--card-border);
      background:#fff;
      border-radius:10px;
      padding:10px 12px;
      font-weight:700;
      cursor:pointer;
    }

    .small-note{
      margin-top:10px;
      font-size:.92rem;
      color:#5c6870;
    }

    .link-btn{
      background:transparent;
      border:none;
      color:#c2173b;
      font-weight:700;
      cursor:pointer;
      padding:0;
      text-decoration:underline;
      font:inherit;
    }

    .status{
      margin-top:10px;
      font-weight:600;
    }

    .status.ok{ color:#0e7a4f; }
    .status.err{ color:#c2173b; }

    .hidden{ display:none; }

    .profile-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    .orders-list{
      display:grid;
      gap:10px;
      margin-top:10px;
    }

    .order-card{
      border:1px solid var(--card-border);
      border-radius:12px;
      padding:10px 12px;
      background:#fff;
    }

    .order-summary{
      width:100%;
      border:1px solid var(--card-border);
      border-radius:12px;
      padding:12px;
      background:#fff;
      text-align:left;
      cursor:pointer;
      transition:box-shadow .15s, transform .15s, border-color .15s;
      font:inherit;
      color:inherit;
    }

    .order-summary:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(255,77,109,.12);
      border-color:rgba(255,77,109,.25);
    }

    .order-summary .order-head{
      margin-bottom:4px;
    }

    .order-summary-meta{
      display:flex;
      flex-wrap:wrap;
      gap:6px;
      margin-top:6px;
      font-size:.9rem;
      color:#4f5b63;
    }

    .order-chip{
      display:inline-flex;
      align-items:center;
      padding:4px 8px;
      border-radius:999px;
      border:1px solid var(--card-border);
      background:#fff8ef;
      color:#3a3a3a;
      font-size:.82rem;
      font-weight:600;
    }

    .order-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      font-weight:700;
      margin-bottom:6px;
    }

    .order-items{
      margin:8px 0 0;
      padding-left:18px;
    }

    .modal-overlay{
      position:fixed;
      inset:0;
      z-index:1200;
      background:rgba(0,0,0,.42);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:14px;
    }

    .modal-card{
      width:min(96%,620px);
      max-height:86vh;
      overflow:auto;
      background:#fff;
      border:1px solid var(--card-border);
      border-radius:16px;
      box-shadow:0 24px 60px rgba(0,0,0,.2);
      padding:16px;
    }

    .modal-top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:10px;
    }

    .modal-close{
      border:1px solid var(--card-border);
      background:#fff;
      border-radius:10px;
      width:36px;
      height:36px;
      line-height:1;
      font-size:1.3rem;
      cursor:pointer;
    }

    .modal-meta{
      font-size:.92rem;
      color:#4f5b63;
      display:grid;
      gap:4px;
      margin-bottom:8px;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="container">
    <section class="section" aria-labelledby="titre-compte">
      <h2 id="titre-compte">Mon compte</h2>
      <div class="sep" aria-hidden="true"></div>

      <div class="account-wrap">
        <div id="authArea" class="card">
          <h3>Connexion</h3>
          <form id="loginForm" class="auth-form" novalidate>
            <div class="field">
              <label for="loginEmail">Email</label>
              <input id="loginEmail" name="email" type="email" required />
            </div>
            <div class="field">
              <label for="loginPassword">Mot de passe</label>
              <input id="loginPassword" name="password" type="password" required />
            </div>
            <button class="btn-main" type="submit">Se connecter</button>
          </form>
          <p id="loginStatus" class="status" aria-live="polite"></p>

          <p class="small-note">
            Pas encore de compte ?
            <button id="showRegisterBtn" type="button" class="link-btn">Inscrivez-vous</button>
          </p>

          <div id="registerWrap" class="hidden">
            <hr style="border:none;border-top:1px solid var(--card-border);margin:14px 0;" />
            <h3 style="margin-top:0;">Inscription</h3>
            <form id="registerForm" class="auth-form" novalidate>
              <div class="field">
                <label for="regName">Nom complet</label>
                <input id="regName" name="name" type="text" required />
              </div>
              <div class="field">
                <label for="regEmail">Email</label>
                <input id="regEmail" name="email" type="email" required />
              </div>
              <div class="field">
                <label for="regPassword">Mot de passe</label>
                <input id="regPassword" name="password" type="password" minlength="6" required />
              </div>
              <div class="field">
                <label for="regPasswordConfirm">Confirmer le mot de passe</label>
                <input id="regPasswordConfirm" name="password_confirm" type="password" minlength="6" required />
              </div>
              <div class="profile-actions">
                <button class="btn-main" type="submit">Creer mon compte</button>
                <button id="hideRegisterBtn" class="btn-light" type="button">Annuler</button>
              </div>
            </form>
            <p id="registerStatus" class="status" aria-live="polite"></p>
          </div>
        </div>

        <div id="profileArea" class="hidden">
          <div class="card">
            <h3>Mes informations</h3>
            <form id="profileForm" class="auth-form" novalidate>
              <input id="currentEmail" type="hidden" />
              <div class="field">
                <label for="profileName">Nom complet</label>
                <input id="profileName" name="name" type="text" required />
              </div>
              <div class="field">
                <label for="profileEmail">Email</label>
                <input id="profileEmail" name="email" type="email" required />
              </div>
              <div class="field">
                <label for="profilePassword">Nouveau mot de passe (optionnel)</label>
                <input id="profilePassword" name="password" type="password" minlength="6" />
              </div>
              <div class="field">
                <label for="profilePasswordConfirm">Confirmer le nouveau mot de passe</label>
                <input id="profilePasswordConfirm" name="password_confirm" type="password" minlength="6" />
              </div>
              <div class="profile-actions">
                <button class="btn-main" type="submit">Enregistrer mes infos</button>
                <button id="logoutBtn" class="btn-light" type="button">Se deconnecter</button>
              </div>
            </form>
            <p id="profileStatus" class="status" aria-live="polite"></p>
          </div>

          <div class="card">
            <h3>Mes commandes passees</h3>
            <div id="userOrders" class="orders-list"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <div id="orderModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="orderModalTitle">
      <div class="modal-top">
        <h3 id="orderModalTitle" style="margin:0;color:#c2173b;">Detail de commande</h3>
        <button id="orderModalClose" class="modal-close" type="button" aria-label="Fermer">&times;</button>
      </div>
      <div id="orderModalMeta" class="modal-meta"></div>
      <div id="orderModalItems"></div>
      <div id="orderModalComment" class="small-note" style="margin-top:10px;"></div>
      <div class="profile-actions">
        <button id="reorderBtn" class="btn-main" type="button">Commander a nouveau</button>
      </div>
    </div>
  </div>

  <div id="footer"></div>

  <script>
    const ACCOUNTS_KEY = 'yumeko_accounts_v1';
    const SESSION_KEY = 'yumeko_session_v1';
    const ORDERS_KEY = 'yumeko_orders_v1';
    const REORDER_KEY = 'yumeko_reorder_cart_v1';
    const ADMIN_EMAIL = 'admin@yumeko.fr';
    const ADMIN_PASSWORD = 'Admin123!';
    const ADMIN_NAME = 'Admin Yumeko';
    let userOrdersCache = [];
    let selectedOrder = null;

    function setActiveNav() {
      const here = location.pathname.split('/').pop() || 'mon-compte.html';
      document.querySelectorAll('.main-nav a').forEach(a => {
        const href = a.getAttribute('href');
        if (href && here === href) a.classList.add('active');
      });
    }

    function loadComponent(id, file) {
      fetch(file)
        .then(response => response.text())
        .then(data => {
          document.getElementById(id).innerHTML = data;
          if (id === 'header') setActiveNav();
        });
    }

    function readJSON(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
      catch (e) { return fallback; }
    }

    function writeJSON(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function readAccounts() {
      return readJSON(ACCOUNTS_KEY, []);
    }

    function saveAccounts(accounts) {
      writeJSON(ACCOUNTS_KEY, accounts);
    }

    function readSession() {
      return readJSON(SESSION_KEY, null);
    }

    function writeSession(account) {
      writeJSON(SESSION_KEY, {
        name: account.name,
        email: account.email,
        role: account.role || 'user'
      });
    }

    function clearSession() {
      localStorage.removeItem(SESSION_KEY);
    }

    function readOrders() {
      return readJSON(ORDERS_KEY, []);
    }

    function setStatus(el, msg, ok) {
      if (!el) return;
      el.textContent = msg;
      el.className = 'status ' + (ok ? 'ok' : 'err');
    }

    function ensureAdminAccount() {
      const accounts = readAccounts();
      const idx = accounts.findIndex(a => String(a.email).toLowerCase() === ADMIN_EMAIL);
      if (idx === -1) {
        accounts.push({ name: ADMIN_NAME, email: ADMIN_EMAIL, password: ADMIN_PASSWORD, role: 'admin' });
      } else {
        accounts[idx].role = 'admin';
        if (!accounts[idx].name) accounts[idx].name = ADMIN_NAME;
      }
      saveAccounts(accounts);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString('fr-FR');
    }

    function getOrderItemsCount(order) {
      const items = Array.isArray(order.items) ? order.items : [];
      return items.reduce((sum, it) => sum + (Number(it.qty) || 1), 0);
    }

    function renderOrdersForUser(email) {
      const box = document.getElementById('userOrders');
      if (!box) return;

      const mail = String(email || '').toLowerCase();
      const orders = readOrders()
        .filter(o => {
          const orderEmail = String(o.email || '').toLowerCase();
          const accountEmail = String(o.account_email || '').toLowerCase();
          return orderEmail === mail || accountEmail === mail;
        })
        .sort((a, b) => String(b.created_at).localeCompare(String(a.created_at)));
      userOrdersCache = orders;

      if (!orders.length) {
        box.innerHTML = '<p class="muted">Aucune commande pour le moment.</p>';
        return;
      }

      box.innerHTML = orders.map((order, idx) => {
        const count = getOrderItemsCount(order);
        const previewItems = (Array.isArray(order.items) ? order.items : []).slice(0, 2);
        const previewText = previewItems.map(it => escapeHtml(it.name)).join(' / ');
        const hasMore = (Array.isArray(order.items) ? order.items.length : 0) > 2;
        return (
          '<button type="button" class="order-summary" data-order-index="' + idx + '">' +
            '<div class="order-head">' +
              '<span>' + escapeHtml(order.id || 'Commande') + '</span>' +
              '<span>' + formatDate(order.created_at) + '</span>' +
            '</div>' +
            '<div class="order-summary-meta">' +
              '<span class="order-chip">' + count + ' article(s)</span>' +
              (previewText ? '<span>' + previewText + (hasMore ? '...' : '') + '</span>' : '<span>Apercu indisponible</span>') +
            '</div>' +
          '</button>'
        );
      }).join('');
    }

    function openOrderModal(order) {
      const modal = document.getElementById('orderModal');
      const meta = document.getElementById('orderModalMeta');
      const itemsBox = document.getElementById('orderModalItems');
      const comment = document.getElementById('orderModalComment');
      if (!modal || !meta || !itemsBox || !comment) return;

      selectedOrder = order;
      const count = getOrderItemsCount(order);
      meta.innerHTML =
        '<div><strong>Commande:</strong> ' + escapeHtml(order.id || '-') + '</div>' +
        '<div><strong>Date:</strong> ' + formatDate(order.created_at) + '</div>' +
        '<div><strong>Total articles:</strong> ' + count + '</div>';

      const items = Array.isArray(order.items) ? order.items : [];
      if (!items.length) {
        itemsBox.innerHTML = '<p class="muted">Aucun article detaille.</p>';
      } else {
        itemsBox.innerHTML = '<ul class="order-items">' +
          items.map(it => '<li>' + escapeHtml(it.name) + ' x' + (Number(it.qty) || 1) + '</li>').join('') +
          '</ul>';
      }

      comment.innerHTML = order.comments
        ? '<strong>Commentaire:</strong> ' + escapeHtml(order.comments)
        : '';

      modal.classList.remove('hidden');
      modal.setAttribute('aria-hidden', 'false');
    }

    function closeOrderModal() {
      const modal = document.getElementById('orderModal');
      if (!modal) return;
      modal.classList.add('hidden');
      modal.setAttribute('aria-hidden', 'true');
      selectedOrder = null;
    }

    function reorderFromSelectedOrder() {
      if (!selectedOrder) return;
      const items = Array.isArray(selectedOrder.items) ? selectedOrder.items : [];
      if (!items.length) return;

      const payload = items
        .map(it => ({
          code: String(it.code || '').trim(),
          name: String(it.name || '').trim(),
          qty: Number(it.qty) || 1
        }))
        .filter(it => it.code && it.qty > 0);

      if (!payload.length) return;
      localStorage.setItem(REORDER_KEY, JSON.stringify(payload));
      window.location.href = 'index.html?reorder=1';
    }

    function showRegister(show) {
      const wrap = document.getElementById('registerWrap');
      if (!wrap) return;
      wrap.classList.toggle('hidden', !show);
    }

    function renderUI() {
      const session = readSession();
      const authArea = document.getElementById('authArea');
      const profileArea = document.getElementById('profileArea');

      if (!session) {
        authArea.classList.remove('hidden');
        profileArea.classList.add('hidden');
        showRegister(false);
        return;
      }

      authArea.classList.add('hidden');
      profileArea.classList.remove('hidden');

      document.getElementById('profileName').value = session.name || '';
      document.getElementById('profileEmail').value = session.email || '';
      document.getElementById('currentEmail').value = session.email || '';
      document.getElementById('profilePassword').value = '';
      document.getElementById('profilePasswordConfirm').value = '';

      renderOrdersForUser(session.email || '');
    }

    function initAuth() {
      const showRegisterBtn = document.getElementById('showRegisterBtn');
      const hideRegisterBtn = document.getElementById('hideRegisterBtn');

      showRegisterBtn?.addEventListener('click', () => showRegister(true));
      hideRegisterBtn?.addEventListener('click', () => showRegister(false));

      document.getElementById('registerForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const status = document.getElementById('registerStatus');
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim().toLowerCase();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regPasswordConfirm').value;

        if (!name || !email || !password || !confirm) {
          setStatus(status, 'Merci de remplir tous les champs.', false);
          return;
        }
        if (password.length < 6) {
          setStatus(status, 'Le mot de passe doit contenir au moins 6 caracteres.', false);
          return;
        }
        if (password !== confirm) {
          setStatus(status, 'Les mots de passe ne correspondent pas.', false);
          return;
        }

        const accounts = readAccounts();
        if (accounts.some(a => String(a.email).toLowerCase() === email)) {
          setStatus(status, 'Un compte existe deja avec cet email.', false);
          return;
        }

        const account = { name, email, password, role: 'user' };
        accounts.push(account);
        saveAccounts(accounts);
        writeSession(account);
        setStatus(status, 'Compte cree avec succes.', true);
        e.target.reset();
        renderUI();
      });

      document.getElementById('loginForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const status = document.getElementById('loginStatus');
        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
          setStatus(status, 'Merci de remplir tous les champs.', false);
          return;
        }

        const account = readAccounts().find(a =>
          String(a.email).toLowerCase() === email && String(a.password) === String(password)
        );

        if (!account) {
          setStatus(status, 'Email ou mot de passe incorrect.', false);
          return;
        }

        writeSession(account);
        setStatus(status, 'Connexion reussie.', true);
        e.target.reset();
        renderUI();
      });
    }

    function initProfile() {
      document.getElementById('logoutBtn')?.addEventListener('click', () => {
        clearSession();
        setStatus(document.getElementById('profileStatus'), '', false);
        renderUI();
      });

      document.getElementById('profileForm')?.addEventListener('submit', (e) => {
        e.preventDefault();
        const status = document.getElementById('profileStatus');
        const currentEmail = document.getElementById('currentEmail').value.trim().toLowerCase();
        const name = document.getElementById('profileName').value.trim();
        const email = document.getElementById('profileEmail').value.trim().toLowerCase();
        const password = document.getElementById('profilePassword').value;
        const confirm = document.getElementById('profilePasswordConfirm').value;

        if (!name || !email) {
          setStatus(status, 'Nom et email sont obligatoires.', false);
          return;
        }

        if (password || confirm) {
          if (password.length < 6) {
            setStatus(status, 'Le nouveau mot de passe doit contenir au moins 6 caracteres.', false);
            return;
          }
          if (password !== confirm) {
            setStatus(status, 'La confirmation du mot de passe ne correspond pas.', false);
            return;
          }
        }

        const accounts = readAccounts();
        const idx = accounts.findIndex(a => String(a.email).toLowerCase() === currentEmail);
        if (idx === -1) {
          setStatus(status, 'Compte introuvable.', false);
          return;
        }

        const duplicate = accounts.some((a, i) => i !== idx && String(a.email).toLowerCase() === email);
        if (duplicate) {
          setStatus(status, 'Cet email est deja utilise par un autre compte.', false);
          return;
        }

        accounts[idx].name = name;
        accounts[idx].email = email;
        if (password) accounts[idx].password = password;
        saveAccounts(accounts);
        writeSession(accounts[idx]);
        setStatus(status, 'Informations mises a jour.', true);
        renderUI();
      });
    }

    function initOrdersSummary() {
      document.getElementById('userOrders')?.addEventListener('click', (e) => {
        const btn = e.target.closest('.order-summary');
        if (!btn) return;
        const idx = Number(btn.dataset.orderIndex);
        if (!Number.isInteger(idx) || idx < 0 || idx >= userOrdersCache.length) return;
        openOrderModal(userOrdersCache[idx]);
      });

      document.getElementById('orderModalClose')?.addEventListener('click', closeOrderModal);
      document.getElementById('orderModal')?.addEventListener('click', (e) => {
        if (e.target.id === 'orderModal') closeOrderModal();
      });
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeOrderModal();
      });
      document.getElementById('reorderBtn')?.addEventListener('click', reorderFromSelectedOrder);
    }

    loadComponent('header', 'header.html');
    loadComponent('footer', 'footer.html');
    ensureAdminAccount();
    initAuth();
    initProfile();
    initOrdersSummary();
    renderUI();
  </script>
</body>
</html>
