<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>YUMEKO SUSHIS - Merci</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/favicon.png" />
  <meta name="theme-color" content="#ff4d6d" />

  <style>
    .merci-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:8px;
    }

    #orderRecap{
      background:#fff8fc;
      border:1px solid var(--card-border);
      border-radius:14px;
      padding:14px;
      white-space:pre-wrap;
      overflow:auto;
      max-height:50vh;
      color:#333;
    }
  </style>
</head>
<body>
  <div id="header"></div>

  <main class="container">
    <section class="section" aria-labelledby="titre-merci">
      <h2 id="titre-merci">Merci pour votre commande !</h2>
      <div class="sep" aria-hidden="true"></div>

      <p class="muted">Nous avons bien recu votre commande. Voici votre recapitulatif :</p>
      <pre id="orderRecap" class="lead">(Chargement du recapitulatif...)</pre>

      <div class="merci-actions">
        <a class="btn" href="accueil.html">Retour a l'accueil</a>
        <a class="btn" href="index.html#menu">Nouvelle commande</a>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    function setActiveNav() {
      const here = location.pathname.split('/').pop() || "merci.html";
      document.querySelectorAll(".main-nav a").forEach(a => {
        const href = a.getAttribute("href");
        if (href && here === href) {
          a.classList.add("active");
        }
      });
    }

    function loadComponent(id, file) {
      fetch(file)
        .then(response => response.text())
        .then(data => {
          document.getElementById(id).innerHTML = data;
          if (id === "header") {
            setActiveNav();
          }
        });
    }

    function renderOrderRecap() {
      const recapEl = document.getElementById("orderRecap");
      let text = "";
      try {
        text = localStorage.getItem("yumeko_last_order") || "";
      } catch (e) {}

      if (!text.trim()) {
        recapEl.textContent = "Aucun recapitulatif trouve.\n\nAstuce : passez une commande depuis le menu pour voir le detail ici.";
        return;
      }

      const withoutHeader = text.replace(/\n?Articles\s*:\s*\n?/i, "");
      const transformed = withoutHeader
        .split("\n")
        .map(line => {
          if (/^\s*-\s*/.test(line)) {
            const body = line.replace(/^\s*-\s*/, "").trim();
            return "article : " + body;
          }
          return line;
        })
        .join("\n")
        .trim();

      recapEl.textContent = transformed;
    }

    loadComponent("header", "header.html");
    loadComponent("footer", "footer.html");
    renderOrderRecap();
  </script>
</body>
</html>
