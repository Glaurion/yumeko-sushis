<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>YUMEKO SUSHIS - Merci</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <link rel="icon" type="image/png" href="images/favicon.png" />
  <link rel="apple-touch-icon" href="images/favicon.png" />
  <link rel="preload" href="images/logo-yumeko.png" as="image" />
  <link rel="prefetch" href="accueil.html" />
  <link rel="prefetch" href="index.html" />
  <meta name="theme-color" content="#ff4d6d" />

  <style>
    .merci-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:center;
      margin-top:8px;
    }

    #orderRecap{
      background:#fff;
      border:1px solid var(--card-border);
      border-radius:14px;
      padding:16px;
      overflow:auto;
      max-height:50vh;
      color:#2a2a2a;
      box-shadow:var(--shadow-soft);
    }

    .recap-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:10px;
      margin-bottom:12px;
    }

    .recap-box{
      background:#fff8ef;
      border:1px solid var(--card-border);
      border-radius:10px;
      padding:10px 12px;
    }

    .recap-box .k{
      font-size:.78rem;
      text-transform:uppercase;
      letter-spacing:.05em;
      color:#7a6772;
      font-weight:700;
      margin-bottom:4px;
    }

    .recap-box .v{
      font-size:.98rem;
      font-weight:700;
      color:#1f1f1f;
      word-break:break-word;
    }

    .recap-title{
      margin:10px 0 8px;
      font-size:1rem;
      font-weight:800;
      color:#c2173b;
    }

    .recap-items{
      list-style:none;
      margin:0;
      padding:0;
      display:grid;
      gap:8px;
    }

    .recap-item{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:8px 10px;
      border-radius:10px;
      border:1px solid var(--card-border);
      background:#fffafc;
    }

    .recap-item-name{
      font-weight:700;
      color:#222;
    }

    .recap-item-qty{
      font-size:.85rem;
      font-weight:800;
      color:#c2173b;
      white-space:nowrap;
    }

    .recap-note{
      margin-top:12px;
      border-top:1px dashed rgba(0,0,0,.1);
      padding-top:10px;
      font-size:.95rem;
      color:#4a4a4a;
      white-space:pre-wrap;
    }

    @media (max-width:640px){
      .recap-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div id="header">
    <header class="site-header jp">
      <div class="header-inner">
        <a href="accueil.html" class="brand" aria-label="Accueil - YUMEKO SUSHIS">
          <img src="images/logo-yumeko.png" alt="YUMEKO SUSHIS" class="logo" width="200" height="200" decoding="async" fetchpriority="high">
          <div class="brand-text">
            <h1>YUMEKO SUSHIS</h1>
          </div>
        </a>
        <nav class="main-nav">
          <a href="accueil.html">Accueil</a>
          <span class="nav-sep" aria-hidden="true"></span>
          <a href="index.html">Menu</a>
          <span class="nav-sep" aria-hidden="true"></span>
          <a href="mon-compte.html">Mon compte</a>
        </nav>
      </div>
    </header>
  </div>

  <main class="container">
    <section class="section" aria-labelledby="titre-merci">
      <h2 id="titre-merci">Merci pour votre commande !</h2>
      <div class="sep" aria-hidden="true"></div>

      <p class="muted">Recapitulatif de votre commande :</p>
      <div id="orderRecap" class="lead">(Chargement du recapitulatif...)</div>

      <div class="merci-actions">
        <a class="btn" href="accueil.html">Retour a l'accueil</a>
        <a class="btn" href="index.html#menu">Nouvelle commande</a>
      </div>
    </section>

    <section class="section review-cta" aria-labelledby="review-after-order-title">
      <h3 id="review-after-order-title">Un petit avis ?</h3>
      <p class="muted">Votre retour nous aide a ameliorer votre prochaine commande.</p>
      <div class="merci-actions" style="justify-content:flex-start;">
        <button id="openReviewFromMerci" type="button" class="btn">Laisser un avis maintenant</button>
      </div>

      <form id="merciReviewForm" class="review-form hidden" novalidate>
        <div class="review-form-grid">
          <div class="review-field">
            <label for="merciReviewName">Votre prenom (optionnel)</label>
            <input id="merciReviewName" name="name" type="text" maxlength="40" placeholder="Ex : Lea" />
          </div>
          <div class="review-field">
            <label for="merciReviewRating">Note</label>
            <select id="merciReviewRating" name="rating">
              <option value="5">5 / 5</option>
              <option value="4">4 / 5</option>
              <option value="3">3 / 5</option>
              <option value="2">2 / 5</option>
              <option value="1">1 / 5</option>
            </select>
          </div>
          <div class="review-field full">
            <label for="merciReviewText">Votre avis</label>
            <textarea id="merciReviewText" name="text" minlength="8" maxlength="400" required placeholder="Partagez votre experience YUMEKO SUSHIS."></textarea>
          </div>
        </div>
        <div class="review-form-actions">
          <button type="submit" class="btn">Envoyer mon avis</button>
        </div>
      </form>
      <p id="merciReviewStatus" class="status" aria-live="polite"></p>
    </section>
  </main>

  <div id="footer"></div>

  <script>
    function setActiveNav() {
      const here = location.pathname.split('/').pop() || "merci.html";
      document.querySelectorAll(".main-nav a").forEach(a => {
        const href = a.getAttribute("href");
        if (href && here === href) {
          a.classList.add("active");
        }
      });
    }

    function loadComponent(id, file) {
      const host = document.getElementById(id);
      if (!host) return;
      if (host.innerHTML.trim().length) {
        if (id === "header") setActiveNav();
        return;
      }
      fetch(file)
        .then(response => response.text())
        .then(data => {
          host.innerHTML = data;
          if (id === "header") {
            setActiveNav();
          }
        });
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll("\"", "&quot;")
        .replaceAll("'", "&#039;");
    }

    function buildRecapFromRawText(text) {
      const lines = String(text || "")
        .split(/\r?\n/)
        .map((l) => l.trim())
        .filter((l) => l.length > 0);

      const clientLine = lines.find((l) => /^client\s*:/i.test(l)) || "";
      const emailLine = lines.find((l) => /^email\s*:/i.test(l)) || "";
      const client = clientLine.replace(/^client\s*:/i, "").trim() || "Client";
      const email = emailLine.replace(/^email\s*:/i, "").trim() || "-";

      let inItems = false;
      let inNotes = false;
      const items = [];
      const notes = [];

      lines.forEach((line) => {
        if (/^articles?\s*:/i.test(line)) {
          inItems = true;
          inNotes = false;
          return;
        }
        if (/^allergies\s*\/\s*autres\s*:/i.test(line)) {
          inItems = false;
          inNotes = true;
          const rest = line.replace(/^allergies\s*\/\s*autres\s*:/i, "").trim();
          if (rest) notes.push(rest);
          return;
        }
        if (inItems && /^\s*-\s*/.test(line)) {
          const row = line.replace(/^\s*-\s*/, "").trim();
          if (!row) return;
          const m = row.match(/^(.*)\sx(\d+)\s*$/i);
          items.push({
            name: m ? m[1].trim() : row,
            qty: m ? Number(m[2]) : 1
          });
          return;
        }
        if (inNotes) notes.push(line);
      });

      return {
        client,
        email,
        items,
        notes: notes.join("\n").trim() || "-"
      };
    }

    function renderOrderRecap() {
      const recapEl = document.getElementById("orderRecap");
      let text = "";
      try {
        text = localStorage.getItem("yumeko_last_order") || "";
      } catch (e) {}

      if (!text.trim()) {
        recapEl.innerHTML = '<p class="muted">Aucun recapitulatif trouve.</p><p class="muted" style="margin-top:6px;">Astuce : passez une commande depuis le menu pour voir le detail ici.</p>';
        return;
      }

      const recap = buildRecapFromRawText(text);
      const totalItems = recap.items.reduce((sum, it) => sum + (Number(it.qty) || 1), 0);
      const itemsHtml = recap.items.length
        ? recap.items.map((it) => (
            '<li class="recap-item">' +
              '<span class="recap-item-name">' + escapeHtml(it.name) + '</span>' +
              '<span class="recap-item-qty">x' + (Number(it.qty) || 1) + '</span>' +
            '</li>'
          )).join("")
        : '<li class="muted">Aucun article detaille.</li>';

      recapEl.innerHTML =
        '<div class="recap-grid">' +
          '<div class="recap-box"><div class="k">Client</div><div class="v">' + escapeHtml(recap.client) + '</div></div>' +
          '<div class="recap-box"><div class="k">E-mail</div><div class="v">' + escapeHtml(recap.email) + '</div></div>' +
          '<div class="recap-box"><div class="k">Total articles</div><div class="v">' + totalItems + '</div></div>' +
          '<div class="recap-box"><div class="k">Statut</div><div class="v">Commande envoyee</div></div>' +
        '</div>' +
        '<h4 class="recap-title">Articles</h4>' +
        '<ul class="recap-items">' + itemsHtml + '</ul>' +
        '<div class="recap-note"><strong>Allergies / autres :</strong> ' + escapeHtml(recap.notes) + '</div>';
    }

    const REVIEWS_KEY = "yumeko_reviews_v1";

    function readReviews() {
      try {
        const raw = JSON.parse(localStorage.getItem(REVIEWS_KEY) || "[]");
        return Array.isArray(raw) ? raw : [];
      } catch (e) {
        return [];
      }
    }

    function saveReviews(list) {
      try {
        localStorage.setItem(REVIEWS_KEY, JSON.stringify(list));
      } catch (e) {}
    }

    function getCustomerNameFromLastOrder() {
      try {
        const text = localStorage.getItem("yumeko_last_order") || "";
        const match = text.match(/Client\s*:\s*(.+)/i);
        return match ? String(match[1]).trim() : "";
      } catch (e) {
        return "";
      }
    }

    function normalizeReview(review) {
      const name = String(review && review.name || "").trim().slice(0, 40) || "Client";
      const text = String(review && review.text || "").trim().slice(0, 400);
      const ratingNumber = Number(review && review.rating || 5);
      const rating = Math.max(1, Math.min(5, Number.isFinite(ratingNumber) ? ratingNumber : 5));
      return {
        name,
        text,
        rating,
        created_at: String(review && review.created_at || new Date().toISOString()),
        source: String(review && review.source || "merci")
      };
    }

    function initReviewPrompt() {
      const btn = document.getElementById("openReviewFromMerci");
      const form = document.getElementById("merciReviewForm");
      const status = document.getElementById("merciReviewStatus");
      const nameInput = document.getElementById("merciReviewName");
      const ratingInput = document.getElementById("merciReviewRating");
      const textInput = document.getElementById("merciReviewText");
      if (!btn || !form || !status || !nameInput || !ratingInput || !textInput) return;

      const defaultName = getCustomerNameFromLastOrder();
      if (defaultName) nameInput.value = defaultName;

      btn.addEventListener("click", () => {
        form.classList.remove("hidden");
        textInput.focus();
        btn.classList.add("hidden");
      });

      form.addEventListener("submit", (e) => {
        e.preventDefault();
        const text = String(textInput.value || "").trim();
        if (text.length < 8) {
          status.textContent = "Votre avis doit contenir au moins 8 caracteres.";
          status.className = "status err";
          return;
        }

        const review = normalizeReview({
          name: String(nameInput.value || "").trim(),
          rating: Number(ratingInput.value || 5),
          text,
          created_at: new Date().toISOString(),
          source: "merci"
        });

        const list = readReviews();
        list.unshift(review);
        saveReviews(list.slice(0, 120));

        form.reset();
        if (defaultName) nameInput.value = defaultName;
        ratingInput.value = "5";
        status.textContent = "Merci pour votre avis, il a bien ete enregistre.";
        status.className = "status ok";
      });
    }

    loadComponent("header", "header.html");
    loadComponent("footer", "footer.html");
    renderOrderRecap();
    initReviewPrompt();

    (function(){
      const root = document.documentElement;
      function updateSakura(){
        const doc = document.documentElement;
        const max = (doc.scrollHeight - window.innerHeight) || 1;
        const p = Math.min(1, Math.max(0, window.scrollY / max));
        const eased = 1 - Math.pow(1 - p, 1.6);
        root.style.setProperty("--sakuraAmt", eased.toFixed(3));
      }
      updateSakura();
      window.addEventListener("scroll", updateSakura, { passive:true });
      window.addEventListener("resize", updateSakura);
    })();
  </script>
</body>
</html>
